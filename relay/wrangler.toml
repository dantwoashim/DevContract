name = "devcontract-relay"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[vars]
ENVIRONMENT = "production"
MAX_BLOB_SIZE = "65536"
INVITE_TTL_HOURS = "24"
BLOB_TTL_HOURS = "72"

# KV namespace binding
[[kv_namespaces]]
binding = "DEVCONTRACT_DATA"
id = "placeholder-kv-id"

[[durable_objects.bindings]]
name = "TEAM_COORDINATOR"
class_name = "TeamCoordinator"

[[durable_objects.bindings]]
name = "RATE_LIMIT_COORDINATOR"
class_name = "RateLimitCoordinator"

[[migrations]]
tag = "v1"
new_classes = ["TeamCoordinator", "RateLimitCoordinator"]

# Rate limiting
[placement]
mode = "smart"
