name = "envsync-relay"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[vars]
ENVIRONMENT = "production"
MAX_BLOB_SIZE = "65536"
INVITE_TTL_HOURS = "24"
BLOB_TTL_HOURS = "72"

# KV namespace binding
[[kv_namespaces]]
binding = "ENVSYNC_DATA"
id = "placeholder-kv-id"

# Rate limiting
[placement]
mode = "smart"
