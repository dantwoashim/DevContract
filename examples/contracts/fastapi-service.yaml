version: 1
project:
  slug: fastapi-service
  name: FastAPI Service
  summary: Example contract for a Python API with a local database dependency.
env:
  required:
    - name: DATABASE_URL
      source: shared
    - name: APP_SECRET
      source: shared
  optional:
    - name: GITHUB_TOKEN
      source: developer-local
runtimes:
  - python
  - uv
services:
  - name: api
    host: 127.0.0.1
    port: 8000
    required: false
    start: uv run uvicorn app.main:app --reload
  - name: postgres
    host: 127.0.0.1
    port: 5432
    required: false
    start: docker compose up -d db
bootstrap:
  steps:
    - uv sync
  outputs:
    - path: .env.local
      kind: env
      gitignore: true
      header: Local FastAPI environment overrides.
run:
  default: dev
  targets:
    dev:
      command: uv run uvicorn app.main:app --reload
