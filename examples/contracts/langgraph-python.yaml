version: 1
project:
  slug: langgraph-python-app
  name: LangGraph Python App
  summary: Example contract for an agent backend with eval tooling and local Python workflows.
env:
  required:
    - name: OPENAI_API_KEY
      source: shared
  optional:
    - name: LANGSMITH_API_KEY
      source: developer-local
    - name: ANTHROPIC_API_KEY
      source: shared
runtimes:
  - python
  - uv
services:
  - name: app
    host: 127.0.0.1
    port: 8123
    required: false
    start: uv run python -m app.main
bootstrap:
  steps:
    - uv sync
  outputs:
    - path: .env.local
      kind: env
      gitignore: true
      header: Local LangGraph environment file.
agents:
  codex:
    output: AGENTS.md
  cursor:
    output: .cursor/rules/envsync.mdc
policies:
  redact_paths:
    - AGENTS.md
    - .cursor
    - evals
run:
  default: dev
  targets:
    dev:
      command: uv run python -m app.main
