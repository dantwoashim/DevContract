version: 1
project:
  slug: vercel-ai-sdk-app
  name: Vercel AI SDK App
  summary: Example contract for a Vercel AI SDK app with GitHub/Copilot-friendly onboarding.
env:
  required:
    - name: OPENAI_API_KEY
      source: shared
  optional:
    - name: ANTHROPIC_API_KEY
      source: shared
  public:
    - NEXT_PUBLIC_APP_URL
runtimes:
  - node
  - pnpm
bootstrap:
  steps:
    - pnpm install
  outputs:
    - path: .env.local
      kind: env
      gitignore: true
      header: Local Vercel AI SDK environment file.
agents:
  copilot:
    output: .github/copilot-instructions.md
    mcp_output: .vscode/mcp.json
  cursor:
    output: .cursor/rules/envsync.mdc
    mcp_output: .cursor/mcp.json
policies:
  redact_paths:
    - .github/copilot-instructions.md
    - .cursor
    - prompts
run:
  default: dev
  targets:
    dev:
      command: pnpm dev
