name: 'EnvSync - Bootstrap Shared Env'
description: 'Pull shared repo secrets with EnvSync and inject them into GitHub Actions'
author: 'EnvSync'

branding:
  icon: 'lock'
  color: 'purple'

inputs:
  service_key:
    description: 'Base64-encoded service key (from ENVSYNC_SERVICE_KEY secret)'
    required: true
  team_id:
    description: 'EnvSync project or team ID'
    required: true
  env_file:
    description: 'Target .env file to pull'
    required: false
    default: '.env'
  relay_url:
    description: 'Relay server URL'
    required: false
    default: 'https://relay.envsync.dev'
  mask_values:
    description: 'Mask secret values in logs'
    required: false
    default: 'true'
  soft_fail:
    description: 'Allow pull failures without failing the workflow'
    required: false
    default: 'false'

outputs:
  env_count:
    description: 'Number of environment variables injected'
  pull_method:
    description: 'Pull method used (relay, lan, relay+lan, or none)'

runs:
  using: 'composite'
  steps:
    - name: Install EnvSync
      shell: bash
      run: |
        if command -v envsync >/dev/null 2>&1; then
          echo "Using existing EnvSync from PATH"
        else
          curl -fsSL https://envsync.dev/install.sh | bash
        fi
        echo "EnvSync installed: $(envsync version --short 2>/dev/null || echo 'unknown')"

    - name: Import service key
      shell: bash
      env:
        ENVSYNC_SERVICE_KEY: ${{ inputs.service_key }}
      run: |
        echo "$ENVSYNC_SERVICE_KEY" | base64 -d > /tmp/envsync-service-key
        chmod 600 /tmp/envsync-service-key

    - name: Pull shared environment
      shell: bash
      run: |
        PULL_REPORT="$RUNNER_TEMP/envsync-pull.json"
        set +e
        envsync pull \
          --service-key /tmp/envsync-service-key \
          --team "${{ inputs.team_id }}" \
          --file "${{ inputs.env_file }}" \
          --relay "${{ inputs.relay_url }}" \
          --timeout 10 \
          --quiet \
          --json > "$PULL_REPORT"
        STATUS=$?
        set -e

        METHOD="$(python - "$PULL_REPORT" <<'PY'
import json
import pathlib
import sys

path = pathlib.Path(sys.argv[1])
if not path.exists():
    print("none")
    raise SystemExit(0)

text = path.read_text(encoding="utf-8").strip()
if not text:
    print("none")
    raise SystemExit(0)

data = json.loads(text)
print(data.get("method", "none"))
PY
)"

        echo "pull_method=${METHOD}" >> "$GITHUB_OUTPUT"

        if [ "$STATUS" -ne 0 ]; then
          if [ "${{ inputs.soft_fail }}" = "true" ]; then
            echo "::warning::EnvSync pull failed but soft_fail=true. Check service key, relay access, and project membership."
            exit 0
          fi
          echo "::error::EnvSync pull failed."
          cat "$PULL_REPORT"
          exit "$STATUS"
        fi

    - name: Inject env file into GitHub Actions
      shell: bash
      run: |
        ENV_FILE="${{ inputs.env_file }}"
        MASK="${{ inputs.mask_values }}"

        if [ ! -f "$ENV_FILE" ]; then
          echo "::warning::No .env file found after pull"
          echo "env_count=0" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        MASK_FLAG=""
        if [ "$MASK" = "true" ]; then
          MASK_FLAG="--mask-values"
        fi

        envsync env export \
          --source "$ENV_FILE" \
          --format github-actions \
          --write "$GITHUB_ENV" \
          --github-output "$GITHUB_OUTPUT" \
          $MASK_FLAG

    - name: Cleanup
      shell: bash
      if: always()
      run: |
        rm -f /tmp/envsync-service-key
        rm -f "${{ inputs.env_file }}"
