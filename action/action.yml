name: 'DevContract - Bootstrap Shared Env'
description: 'Pull shared repo secrets with DevContract and inject them into GitHub Actions'
author: 'DevContract'

branding:
  icon: 'lock'
  color: 'purple'

inputs:
  version:
    description: 'DevContract CLI version to install (default: latest release tag)'
    required: false
    default: 'latest'
  service_key:
    description: 'Base64-encoded service key (from DEVCONTRACT_SERVICE_KEY secret)'
    required: true
  team_id:
    description: 'DevContract project or team ID'
    required: true
  env_file:
    description: 'Target .env file to pull'
    required: false
    default: '.env'
  relay_url:
    description: 'Relay server URL'
    required: false
    default: 'https://relay.devcontract.dev'
  mask_values:
    description: 'Mask secret values in logs'
    required: false
    default: 'true'
  soft_fail:
    description: 'Allow pull failures without failing the workflow'
    required: false
    default: 'false'

outputs:
  env_count:
    description: 'Number of environment variables injected'
    value: ${{ steps.inject.outputs.env_count }}
  pull_method:
    description: 'Pull method used (relay, lan, relay+lan, or none)'
    value: ${{ steps.pull.outputs.pull_method }}

runs:
  using: 'composite'
  steps:
    - name: Install DevContract
      shell: bash
      run: |
        if command -v devcontract >/dev/null 2>&1; then
          echo "Using existing DevContract from PATH"
        else
          bash "${{ github.action_path }}/../scripts/install.sh" \
            --version "${{ inputs.version }}" \
            --install-dir "$RUNNER_TEMP/bin"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
        fi
        echo "DevContract installed: $(devcontract version --short 2>/dev/null || echo 'unknown')"

    - name: Import service key
      shell: bash
      env:
        DEVCONTRACT_SERVICE_KEY: ${{ inputs.service_key }}
      run: |
        echo "$DEVCONTRACT_SERVICE_KEY" | base64 -d > /tmp/devcontract-service-key
        chmod 600 /tmp/devcontract-service-key

    - name: Pull shared environment
      id: pull
      shell: bash
      run: |
        PULL_REPORT="$RUNNER_TEMP/devcontract-pull.json"
        set +e
        devcontract pull \
          --service-key /tmp/devcontract-service-key \
          --project "${{ inputs.team_id }}" \
          --file "${{ inputs.env_file }}" \
          --relay "${{ inputs.relay_url }}" \
          --non-interactive \
          --on-conflict overwrite \
          --timeout 10 \
          --quiet \
          --json > "$PULL_REPORT"
        STATUS=$?
        set -e

        METHOD="$(python - "$PULL_REPORT" <<'PY'
        import json
        import pathlib
        import sys

        path = pathlib.Path(sys.argv[1])
        if not path.exists():
            print("none")
            raise SystemExit(0)

        text = path.read_text(encoding="utf-8").strip()
        if not text:
            print("none")
            raise SystemExit(0)

        data = json.loads(text)
        print(data.get("method", "none"))
        PY
        )"

        echo "pull_method=${METHOD}" >> "$GITHUB_OUTPUT"

        if [ "$STATUS" -ne 0 ]; then
          if [ "${{ inputs.soft_fail }}" = "true" ]; then
            echo "::warning::DevContract pull failed but soft_fail=true. Check service key, relay access, and project membership."
            exit 0
          fi
          echo "::error::DevContract pull failed."
          if [ -f "$PULL_REPORT" ]; then
            cat "$PULL_REPORT"
          fi
          exit "$STATUS"
        fi

    - name: Inject env file into GitHub Actions
      id: inject
      shell: bash
      run: |
        ENV_FILE="${{ inputs.env_file }}"
        MASK="${{ inputs.mask_values }}"

        if [ ! -f "$ENV_FILE" ]; then
          echo "::warning::No .env file found after pull"
          echo "env_count=0" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        MASK_FLAG=""
        if [ "$MASK" = "true" ]; then
          MASK_FLAG="--mask-values"
        fi

        devcontract env export \
          --source "$ENV_FILE" \
          --format github-actions \
          --write "$GITHUB_ENV" \
          --github-output "$GITHUB_OUTPUT" \
          $MASK_FLAG

        if ! grep -q '^env_count=' "$GITHUB_OUTPUT"; then
          COUNT="$(grep -Ec '^[A-Za-z_][A-Za-z0-9_]*=' "$ENV_FILE" || true)"
          echo "env_count=${COUNT}" >> "$GITHUB_OUTPUT"
        fi

    - name: Cleanup
      shell: bash
      if: always()
      run: |
        rm -f /tmp/devcontract-service-key
        rm -f "${{ inputs.env_file }}"
