name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.8'

      - name: Run tests
        run: go test ./... -v -count=1

      - name: Check repo hygiene
        run: bash ./scripts/check_repo_hygiene.sh

      - name: Build source archives
        run: bash ./scripts/package_source.sh dist/source "${GITHUB_REF_NAME}"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
