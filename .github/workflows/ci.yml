name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'

      - name: Vet
        run: go vet ./...

      - name: Test (with race detector)
        run: go test ./... -race -count=1 -timeout=120s

      - name: Build
        run: go build -o envsync ./

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8

      - name: Run golangci-lint
        run: golangci-lint run --out-format=colored-line-number --timeout=5m

  security:
    name: Security Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.23.0

      - name: Run gosec (SAST)
        run: |
          # Keep gosec focused on meaningful security defects for a local CLI:
          # integer overflow, crypto misuse, and relay issues stay enforced.
          # File-path/process/permission warnings are reviewed separately because
          # this tool intentionally reads local files and executes contract-defined commands.
          gosec -exclude=G104,G204,G301,G302,G304,G306,G703 ./...

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  source-build:
    name: Relay And Extension Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Go build
        run: go build ./...

      - name: Check repo identity consistency
        run: go run ./scripts/check_repo_identity

      - name: Verify MCP docs server
        run: node ./scripts/mcp-docs.js --self-check

      - name: Install relay dependencies
        working-directory: relay
        run: npm ci

      - name: Test relay
        working-directory: relay
        run: npm test

      - name: Install extension dependencies
        working-directory: extension
        run: npm ci

      - name: Compile extension
        working-directory: extension
        run: npm run compile

  repo-hygiene:
    name: Repo Hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for tracked build artifacts
        shell: bash
        run: |
          set -euo pipefail
          forbidden="$(git ls-files \
            'envsync.exe' \
            '.gocache/**' \
            'relay/node_modules/**' \
            'extension/node_modules/**' \
            'extension/out/**' \
            'relay/.wrangler/**' \
            'extension/*.vsix' \
            '.envsync/generated/**')"
          if [ -n "$forbidden" ]; then
            echo "Tracked artifacts must not be committed:"
            echo "$forbidden"
            exit 1
          fi

  source-bundle:
    name: Source Bundle Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build source archives
        run: bash ./scripts/package_source.sh "$RUNNER_TEMP/source-bundle"

      - name: Validate source archive contents
        shell: bash
        run: |
          set -euo pipefail
          TAR_FILE="$(ls "$RUNNER_TEMP/source-bundle"/*.tar.gz)"
          tar -tf "$TAR_FILE" > "$RUNNER_TEMP/source-contents.txt"
          if grep -E '(^|/)(\.env(\.|$)|envsync\.exe|node_modules/|extension/out/|relay/\.wrangler/|\.gocache/|.*\.vsix$)' "$RUNNER_TEMP/source-contents.txt"; then
            echo "unexpected files detected in source archive"
            exit 1
          fi

  action-smoke:
    name: Action Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build local EnvSync
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          go build -o "$RUNNER_TEMP/bin/envsync" ./
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Install relay dependencies
        working-directory: relay
        run: npm ci

      - name: Start relay
        shell: bash
        run: |
          cd relay
          npx wrangler dev --port 8787 --local --test-scheduled > "$RUNNER_TEMP/relay.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/relay.pid"

      - name: Wait for relay health
        shell: bash
        run: |
          for _ in $(seq 1 60); do
            if curl -fsS "http://127.0.0.1:8787/health" >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "relay did not become healthy in time"
          cat "$RUNNER_TEMP/relay.log" || true
          exit 1

      - name: Generate service key
        shell: bash
        run: envsync service-key generate --output "$RUNNER_TEMP/action-smoke-service-key"

      - name: Seed relay data
        shell: bash
        run: |
          go run ./scripts/action_smoke_seed.go \
            --relay-url "http://127.0.0.1:8787" \
            --service-key "$RUNNER_TEMP/action-smoke-service-key" \
            --project "smoke-team" \
            --file ".env.test"

      - name: Encode service key for action input
        shell: bash
        run: |
          echo "SMOKE_SERVICE_KEY_B64=$(base64 -w0 "$RUNNER_TEMP/action-smoke-service-key")" >> "$GITHUB_ENV"

      - name: Run local action
        id: action
        uses: ./action
        with:
          service_key: ${{ env.SMOKE_SERVICE_KEY_B64 }}
          team_id: smoke-team
          env_file: .env.test
          relay_url: http://127.0.0.1:8787
          mask_values: false

      - name: Verify action outputs
        shell: bash
        run: |
          test "${{ steps.action.outputs.pull_method }}" = "relay"
          test "${{ steps.action.outputs.env_count }}" = "2"
          test "${API_KEY}" = "abc123"
          test "${MULTILINE}" = $'line1\nline2'

      - name: Run local action again to verify no-op cleanup
        id: action_noop
        uses: ./action
        with:
          service_key: ${{ env.SMOKE_SERVICE_KEY_B64 }}
          team_id: smoke-team
          env_file: .env.test
          relay_url: http://127.0.0.1:8787
          mask_values: false

      - name: Verify no-op action outputs
        shell: bash
        run: |
          test "${{ steps.action_noop.outputs.pull_method }}" = "none"
          test "${{ steps.action_noop.outputs.env_count }}" = "0"

      - name: Invalid service key should fail clearly
        id: action_bad_key
        continue-on-error: true
        uses: ./action
        with:
          service_key: not-base64
          team_id: smoke-team
          env_file: .env.test
          relay_url: http://127.0.0.1:8787

      - name: Verify invalid key failure
        shell: bash
        run: test "${{ steps.action_bad_key.outcome }}" = "failure"

      - name: Relay outage should soft-fail
        id: action_relay_softfail
        uses: ./action
        with:
          service_key: ${{ env.SMOKE_SERVICE_KEY_B64 }}
          team_id: smoke-team
          env_file: .env.test
          relay_url: http://127.0.0.1:9999
          soft_fail: true

      - name: Wrong project should soft-fail
        id: action_wrong_project
        uses: ./action
        with:
          service_key: ${{ env.SMOKE_SERVICE_KEY_B64 }}
          team_id: missing-team
          env_file: .env.test
          relay_url: http://127.0.0.1:8787
          soft_fail: true

      - name: Stop relay
        if: always()
        shell: bash
        run: |
          if [ -f "$RUNNER_TEMP/relay.pid" ]; then
            kill "$(cat "$RUNNER_TEMP/relay.pid")" || true
          fi
          if [ -f "$RUNNER_TEMP/relay.log" ]; then
            cat "$RUNNER_TEMP/relay.log"
          fi
